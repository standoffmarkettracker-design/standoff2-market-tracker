name: Price Update (Every 6 Hours)

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC
    - cron: '0 6 * * *'   # 06:00 UTC
    - cron: '0 12 * * *'  # 12:00 UTC
    - cron: '0 18 * * *'  # 18:00 UTC
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: price-update
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run price update script
        run: python scripts/update_prices.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add items.json price_history_real_1.json price_history_real_2.json collections.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git pull --rebase origin main
          git commit -m "chore: price update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
