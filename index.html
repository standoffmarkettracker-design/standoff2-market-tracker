var __realHistoryCache = null;
var __realHistoryPromise = null;
var __latestPriceDate = null;  // set when history loads; drives the "Updated:" header

function loadRealHistory() {
  if (__realHistoryCache) return Promise.resolve(__realHistoryCache);
  if (__realHistoryPromise) return __realHistoryPromise;
  __realHistoryPromise = Promise.all([
    fetch("/price_history_real_1.json").then(function(r) { return r.ok ? r.json() : {}; }).catch(function() { return {}; }),
    fetch("/price_history_real_2.json").then(function(r) { return r.ok ? r.json() : {}; }).catch(function() { return {}; })
  ])
    .then(function(parts) {
      var data = Object.assign({}, parts[0], parts[1]);
      __realHistoryCache = data;
      // Find the most recent date across all items for the "Updated" banner
      var latest = "";
      Object.values(data).forEach(function(hist) {
        Object.keys(hist).forEach(function(d) { if (d > latest) latest = d; });
      });
      if (latest) {
        var dt = new Date(latest + "T12:00:00");
        __latestPriceDate = dt.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
      }
      return data;
    })
    .catch(function() { __realHistoryCache = {}; return {}; });
  return __realHistoryPromise;
}

// Gaps between consecutive real data points are automatically interpolated (linearly)
// and rendered as dashed lines so they are visually distinct from verified real data.
// No separate estimated file needed — detection is fully dynamic.
function genHistoryFromReal(item, realPoints) {
  var dates = Object.keys(realPoints || {}).sort();
  if (dates.length === 0) return null;
  var realPts = dates.map(function(d) {
    return { date: new Date(d + "T12:00:00"), price: realPoints[d], estimated: false };
  });
  // Append today's live price so the graph always ends at the current price
  var now = new Date();
  var lastDate = realPts[realPts.length - 1].date;
  if (now.getTime() - lastDate.getTime() > 12 * 60 * 60 * 1000) {
    realPts.push({ date: now, price: item.price, estimated: false });
  } else {
    realPts[realPts.length - 1] = { date: now, price: item.price, estimated: false };
  }
  // Fill gaps > 1 day between consecutive real points with linear interpolation.
  // Interpolated points are flagged estimated:true for dashed rendering.
  var msPerDay = 86400000;
  var filled = [];
  for (var i = 0; i < realPts.length; i++) {
    filled.push(realPts[i]);
    if (i < realPts.length - 1) {
      var a = realPts[i], b = realPts[i + 1];
      var gapDays = Math.round((b.date - a.date) / msPerDay);
      if (gapDays > 1) {
        for (var g = 1; g < gapDays; g++) {
          var frac = g / gapDays;
          filled.push({
            date: new Date(a.date.getTime() + g * msPerDay),
            price: Math.round((a.price + (b.price - a.price) * frac) * 100) / 100,
            estimated: true
          });
        }
      }
    }
  }
  return filled;
}

function genHistory(item, firebaseData) {
  var now = new Date(), totalHours = 365*24, pN = item.price;
  var p1 = pN/(1+item.day/100), p7 = pN/(1+item.week/100), p30 = pN/(1+item.month/100), p365 = pN/(1+item.year/100);
  var seed = item.name.split("").reduce(function(a,c){return a+c.charCodeAt(0)},0);
  function rnd(){seed=(seed*16807)%2147483647;return(seed-1)/2147483646}
  function lerp(a,b,t){return a+(b-a)*t}
  function bp(hoursAgo){
    var da = hoursAgo / 24;
    if(da>=30)return lerp(p30,p365,(da-30)/335);
    if(da>=7)return lerp(p7,p30,(da-7)/23);
    if(da>=1)return lerp(p1,p7,(da-1)/6);
    return lerp(pN,p1,da);
  }

  // Always generate a full year of synthetic history based on known % change metrics.
  // (Real Firebase snapshots are too sparse right now to reliably reconstruct a full year,
  // so we use the deterministic synthetic curve for consistent, full-range graphs.)
  var pts=[];
  for(var h=totalHours;h>=0;h-=h>720?12:4){
    var base=bp(h);
    var noiseFactor = h < 168 ? 0.8 : h < 720 ? 0.5 : 0.3;
    var noise=(rnd()-0.5)*2*(item.vol/100)*base*noiseFactor;
    if(rnd()>0.92) noise += (rnd()-0.4)*base*(item.vol/100)*1.5;
    var dt=new Date(now);dt.setHours(dt.getHours()-h);
    pts.push({date:dt,price:Math.max(0.01,base+noise)});
  }
  pts[pts.length-1] = {date:now, price:pN};
  return pts;
}

function GraphModal({ item, onClose }) {
  const rc = RC[item.rarity] || "#888";
  const [realData, setRealData] = useState(undefined); // undefined = loading, null = none available
  useEffect(function() {
    let cancelled = false;
    loadRealHistory().then(function(all) {
      if (cancelled) return;
      var pts = all[item.name] ? genHistoryFromReal(item, all[item.name]) : null;
      setRealData(pts);
    });
    return function() { cancelled = true; };
  }, [item.name]);
  const data = realData === undefined ? null : (realData || genHistory(item, null));
  const isRealData = !!realData;
  const hasEstimated = isRealData && realData.some(function(p){return p.estimated});
  const [hoverIdx, setHoverIdx] = useState(null);
  const [range, setRange] = useState("All");
  const svgRef = useRef(null);
  const rangeDays = { "1W": 7, "1M": 30, "3M": 90, "6M": 180, "1Y": 365, "All": 9999 };
  if (data === null) {
    return (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 }} onClick={onClose}>
        <div style={{ background: "#16161a", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 18, padding: 40, color: "#666", fontSize: 13 }} onClick={function(e){e.stopPropagation()}}>
          Loading price history…
        </div>
      </div>
    );
  }
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - rangeDays[range]);
  const sliced = range === "All" ? data : data.filter(function(p){return p.date >= cutoff});
  const prices = sliced.map(function(p){return p.price});
  const minP = Math.min.apply(null, prices), maxP = Math.max.apply(null, prices);
  const padP = (maxP - minP) * 0.1 || maxP * 0.05;
  const W = 560, H = 200, PT = 10, gH = H - PT;
  function xOf(i) { return (i / (sliced.length - 1)) * W }
  function yOf(p) { return PT + gH - ((p - (minP - padP)) / (maxP + padP - (minP - padP))) * gH }
  const linePath = sliced.map(function(p, i) { return (i === 0 ? "M" : "L") + " " + xOf(i).toFixed(1) + " " + yOf(p.price).toFixed(1) }).join(" ");
  const areaPath = linePath + " L " + xOf(sliced.length - 1).toFixed(1) + " " + (PT + gH).toFixed(1) + " L 0 " + (PT + gH).toFixed(1) + " Z";
  // A segment is drawn dashed if either endpoint is an estimated (interpolated) point,
  // so estimated stretches are always visually distinct from verified real data.
  const lineSegments = [];
  for (var si = 1; si < sliced.length; si++) {
    var segEstimated = !!(sliced[si].estimated || sliced[si - 1].estimated);
    lineSegments.push({
      estimated: segEstimated,
      d: "M " + xOf(si - 1).toFixed(1) + " " + yOf(sliced[si - 1].price).toFixed(1) + " L " + xOf(si).toFixed(1) + " " + yOf(sliced[si].price).toFixed(1)
    });
  }
  const isUp = sliced[sliced.length - 1].price >= sliced[0].price;
  const lineColor = isUp ? "#4caf50" : "#ef5350";
  const gradId = "grad" + item.name.replace(/[^a-zA-Z0-9]/g, "").slice(0, 20);
  function handleMouseMove(e) {
    var svg = svgRef.current; if (!svg) return;
    var rect = svg.getBoundingClientRect();
    var idx = Math.round((e.clientX - rect.left) / rect.width * (sliced.length - 1));
    setHoverIdx(Math.max(0, Math.min(sliced.length - 1, idx)));
  }
  const hovered = hoverIdx !== null ? sliced[hoverIdx] : sliced[sliced.length - 1];
  const hovX = hoverIdx !== null ? xOf(hoverIdx) : xOf(sliced.length - 1);
  const hovY = yOf(hovered.price);
  const pctChange = ((sliced[sliced.length - 1].price - sliced[0].price) / sliced[0].price * 100).toFixed(2);
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 }} onClick={onClose}>
      <div className="s2-graph-modal" style={{ background: "#16161a", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 18, padding: 28, width: 620, maxWidth: "95vw" }} onClick={function(e){e.stopPropagation()}}>
        <div className="s2-graph-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18 }}>
          <div>
            <div style={{ fontSize: 11, color: rc, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 }}>{item.rarity} · {item.type}{isRealData && <span style={{ marginLeft:8, color:"#4caf50", letterSpacing:"normal" }}>● Verified Market Data</span>}{hasEstimated && <span style={{ marginLeft:8, color:"#888", letterSpacing:"normal" }}>┄ Includes estimated days</span>}</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#fff" }}>{item.name}</div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#666", fontSize: 20, cursor: "pointer" }}>✕</button>
        </div>
        <div className="s2-graph-price" style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 20 }}>
          <span style={{ fontSize: 28, fontWeight: 800, color: "#fff", fontFamily: "monospace" }}>{fmtPrice(hovered.price)} G</span>
          <span style={{ fontSize: 14, color: parseFloat(pctChange) >= 0 ? "#4caf50" : "#ef5350", fontWeight: 600 }}>{parseFloat(pctChange)>=0?"▲":"▼"} {Math.abs(pctChange)}% ({range})</span>
          <span style={{ fontSize: 12, color: "#555", marginLeft: "auto" }}>{hovered.date.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}{hovered.estimated && <span style={{ color:"#888" }}> (est.)</span>}</span>
        </div>
        <div className="s2-graph-ranges" style={{ display: "flex", gap: 6, marginBottom: 16 }}>
          {Object.keys(rangeDays).map(function(r){return <button key={r} onClick={function(){setRange(r);setHoverIdx(null)}} style={{ padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",background:range===r?rc+"22":"transparent",border:"1px solid "+(range===r?rc:"rgba(255,255,255,0.1)"),color:range===r?rc:"#666"}}>{r}</button>})}
        </div>
        <svg ref={svgRef} viewBox={"0 0 "+W+" "+H} className="s2-graph-svg" style={{ width:"100%",height:200,cursor:"crosshair",display:"block",touchAction:"none" }} onMouseMove={handleMouseMove} onMouseLeave={function(){setHoverIdx(null)}} onTouchMove={function(e){e.preventDefault();var touch=e.touches[0];var svg=svgRef.current;if(!svg)return;var rect=svg.getBoundingClientRect();var idx=Math.round((touch.clientX-rect.left)/rect.width*(sliced.length-1));setHoverIdx(Math.max(0,Math.min(sliced.length-1,idx)))}}>
          <defs><linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={lineColor} stopOpacity="0.25"/><stop offset="100%" stopColor={lineColor} stopOpacity="0.02"/></linearGradient></defs>
          {[0.25,0.5,0.75].map(function(t){var y=PT+t*gH;var p=(maxP+padP)-t*(maxP+padP-(minP-padP));var lbl=fmtPrice(p);return <g key={t}><line x1={0} y1={y} x2={W} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/><text x={W-4} y={y-3} fill="#444" fontSize="10" textAnchor="end">{lbl}</text></g>})}
          <path d={areaPath} fill={"url(#"+gradId+")"} />
          {lineSegments.map(function(seg, i){return <path key={i} d={seg.d} fill="none" stroke={lineColor} strokeWidth="1.5" strokeLinejoin="round" strokeDasharray={seg.estimated ? "4,3" : undefined} opacity={seg.estimated ? 0.65 : 1} />})}
          <line x1={hovX} y1={PT} x2={hovX} y2={PT+gH} stroke="rgba(255,255,255,0.15)" strokeWidth="1" strokeDasharray="3,3" />
          <circle cx={hovX} cy={hovY} r="4" fill={lineColor} stroke="#16161a" strokeWidth="2" />
        </svg>
        <div className="s2-graph-dates" style={{ display:"flex",justifyContent:"space-between",marginTop:6 }}>
          {[0,0.25,0.5,0.75,1].map(function(t){var idx=Math.round(t*(sliced.length-1));return <span key={t} style={{fontSize:10,color:"#444"}}>{sliced[idx].date.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>})}
        </div>
        <div className="s2-graph-stats" style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:18 }}>
          {[{l:"Open",v:sliced[0].price},{l:"High",v:Math.max.apply(null,prices)},{l:"Low",v:Math.min.apply(null,prices)},{l:"Current",v:item.price}].map(function(s){var fv=fmtPrice(s.v);return <div key={s.l} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:10,color:"#555",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>{s.l}</div><div style={{fontSize:13,fontWeight:700,color:"#ddd",fontFamily:"monospace"}}>{fv} G</div></div>})}
        </div>
        <div style={{ marginTop:14,fontSize:10,color:"#333",textAlign:"center" }}>Chart reconstructed from known price metrics</div>
      </div>
    </div>
  );
}

var BANNED = ["fuck","shit","damn","bitch","ass","dick","cock","pussy","cunt","bastard","whore","slut","fag","nigger","nigga","retard","stfu","gtfo","kys","piss","crap","douche","wanker","twat","bollocks","arsehole","asshole","motherfucker","bullshit","goddamn","dumbass","jackass","shithead","dickhead"];
function filterProfanity(text) {
  var lower = text.toLowerCase();
  var result = text;
  BANNED.forEach(function(word) {
    var regex = new RegExp("\\b" + word + "\\b", "gi");
    result = result.replace(regex, function(match) { return match[0] + "*".repeat(match.length - 1); });
  });
  return result;
}

function chatKey(itemName) {
  return itemName.replace(/[.#$\/\[\]]/g, "_");
}

function cleanOldMessages(itemName) {
  var ref = db.ref("chats/" + chatKey(itemName));
  var cutoff = Date.now() - 24*60*60*1000;
  ref.orderByChild("ts").endAt(cutoff).once("value", function(snap) {
    snap.forEach(function(child) { child.ref.remove(); });
  });
}

function sendMessage(itemName, text) {
  var ref = db.ref("chats/" + chatKey(itemName));
  ref.push({ text: filterProfanity(text), ts: Date.now() });
}

function ItemChat({ item, tier }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [cooldown, setCooldown] = useState(0);
  const timerRef = useRef(null);
  const chatRef = useRef(null);

  React.useEffect(function() {
    if (!item) return;
    var key = chatKey(item.name);
    cleanOldMessages(item.name);
    var ref = db.ref("chats/" + key);
    var cutoff = Date.now() - 24*60*60*1000;
    chatRef.current = ref.orderByChild("ts").startAt(cutoff);
    var handler = chatRef.current.on("value", function(snap) {
      var list = [];
      snap.forEach(function(child) {
        var val = child.val();
        list.push({ text: val.text, ts: val.ts, id: child.key });
      });
      setMsgs(list);
    });
    setInput("");
    return function() { ref.off("value", handler); };
  }, [item && item.name]);

  React.useEffect(function() {
    if (cooldown <= 0) return;
    timerRef.current = setTimeout(function() { setCooldown(cooldown - 1); }, 1000);
    return function() { clearTimeout(timerRef.current); };
  }, [cooldown]);

  if (!item) return null;

  // Cooldown by tier: Free = 3600s (1/hr), Basic = 300s (5 min), VIP/VIP+ = 30s
  var cdTime = tier === "Free" ? 3600 : tier === "Basic" ? 300 : 30;

  function handleSend() {
    if (!input.trim() || cooldown > 0) return;
    sendMessage(item.name, input.trim());
    setInput("");
    setCooldown(cdTime);
  }

  function formatTime(ts) {
    var d = new Date(ts);
    return d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  }

  function formatCd(s) {
    var m = Math.floor(s/60);
    var sec = s%60;
    return m > 0 ? m+"m "+sec+"s" : sec+"s";
  }

  return (
    <div style={{ marginTop:16 }}>
      <div style={{ fontSize:12,color:"#666",letterSpacing:"0.05em",textTransform:"uppercase",marginBottom:8 }}>💬 Item Chat <span style={{ fontSize:10,color:"#4caf50",textTransform:"none" }}>● LIVE</span> <span style={{ fontSize:10,color:"#444",textTransform:"none" }}>(resets every 24h)</span></div>
      <div style={{ background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:10,maxHeight:200,overflowY:"auto",marginBottom:8 }}>
        {msgs.length === 0 && <div style={{ fontSize:11,color:"#444",textAlign:"center",padding:"12px 0" }}>No messages yet — be the first!</div>}
        {msgs.map(function(m) { return (
          <div key={m.id} style={{ marginBottom:6 }}>
            <span style={{ fontSize:10,color:"#555" }}>{formatTime(m.ts)}</span>
            <span style={{ fontSize:12,color:"#ccc",marginLeft:8 }}>{m.text}</span>
          </div>
        )})}
      </div>
      <div style={{ display:"flex",gap:6 }}>
        <input value={input} onChange={function(e){setInput(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")handleSend()}} placeholder={cooldown>0?"Wait "+formatCd(cooldown)+"...":"Type a message..."} disabled={cooldown>0}
          style={{ flex:1,padding:"8px 10px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:cooldown>0?"#555":"#eee",fontSize:12,outline:"none" }} />
        <button onClick={handleSend} disabled={!input.trim()||cooldown>0}
          style={{ padding:"8px 12px",borderRadius:6,background:!input.trim()||cooldown>0?"rgba(255,255,255,0.03)":"#ff6b35",border:"none",color:!input.trim()||cooldown>0?"#555":"#fff",fontSize:12,fontWeight:600,cursor:!input.trim()||cooldown>0?"not-allowed":"pointer" }}>Send</button>
      </div>
      {tier==="Free" && <div style={{ fontSize:10,color:"#444",marginTop:4 }}>Free tier: 1 message per hour · {msgs.length} message{msgs.length!==1?"s":""}</div>}
      {tier==="Basic" && <div style={{ fontSize:10,color:"#444",marginTop:4 }}>Basic tier: 5 min cooldown · {msgs.length} message{msgs.length!==1?"s":""}</div>}
      {(tier==="VIP"||tier==="VIP+") && <div style={{ fontSize:10,color:"#444",marginTop:4 }}>{tier} tier: 30 sec cooldown · {msgs.length} message{msgs.length!==1?"s":""}</div>}
    </div>
  );
}

function AuthLoggedIn({ user, onLogout }) {
  var [ptUsername, setPtUsername] = React.useState("");
  var [ptPublic, setPtPublic] = React.useState(true);
  var [ptSaving, setPtSaving] = React.useState(false);
  var [ptSaved, setPtSaved] = React.useState(false);
  var [ptErr, setPtErr] = React.useState("");
  var [currentUsername, setCurrentUsername] = React.useState(""); // the saved username in Firebase
  var [lastChanged, setLastChanged] = React.useState(null); // timestamp of last username change

  React.useEffect(function() {
    db.ref("playerProfiles/" + user.uid).once("value", function(snap) {
      var val = snap.val();
      if (val) {
        setPtUsername(val.username || "");
        setCurrentUsername(val.username || "");
        setPtPublic(val.public !== false);
        setLastChanged(val.usernameChangedAt || null);
      }
    });
  }, [user.uid]);

  var COOLDOWN_MS = 30 * 24 * 60 * 60 * 1000; // 30 days
  var now = Date.now();
  var cooldownRemaining = lastChanged ? Math.max(0, COOLDOWN_MS - (now - lastChanged)) : 0;
  var isFirstSet = !currentUsername; // no cooldown for first-time setup
  var canChange = isFirstSet || cooldownRemaining === 0;
  var isUsernameUnchanged = ptUsername.trim().toLowerCase() === currentUsername.toLowerCase();

  function formatCooldown(ms) {
    var days = Math.ceil(ms / (24 * 60 * 60 * 1000));
    return days + " day" + (days !== 1 ? "s" : "");
  }

  function savePlayerProfile() {
    var trimmed = ptUsername.trim();
    if (!trimmed) { setPtErr("Username is required"); return; }
    if (!/^[a-zA-Z0-9_\-\.]{3,24}$/.test(trimmed)) { setPtErr("3–24 chars, letters/numbers/underscores only"); return; }

    var usernameActuallyChanging = trimmed.toLowerCase() !== currentUsername.toLowerCase();
    if (usernameActuallyChanging && !canChange) {
      setPtErr("You can only change your username once every 30 days. " + formatCooldown(cooldownRemaining) + " remaining.");
      return;
    }

    setPtSaving(true); setPtErr("");

    function writeProfile(batch) {
      batch["playerProfiles/" + user.uid + "/username"] = trimmed;
      batch["playerProfiles/" + user.uid + "/public"] = ptPublic;
      batch["playerProfiles/" + user.uid + "/uid"] = user.uid;
      batch["playerProfiles/" + user.uid + "/displayName"] = user.displayName || user.email;
      if (usernameActuallyChanging) batch["playerProfiles/" + user.uid + "/usernameChangedAt"] = now;
      db.ref().update(batch, function(err) {
        setPtSaving(false);
        if (err) { setPtErr("Save failed: " + err.message); return; }
        setCurrentUsername(trimmed);
        if (usernameActuallyChanging) setLastChanged(now);
        setPtSaved(true);
        setTimeout(function() { setPtSaved(false); }, 3000);
      });
    }

    // Fast path: username not changing — skip the uniqueness read, write immediately
    if (!usernameActuallyChanging) {
      writeProfile({});
      return;
    }

    // Username is changing — use a transaction on the new username slot to atomically
    // claim it only if it's unclaimed (avoids a separate read round trip)
    db.ref("playerUsernames/" + trimmed.toLowerCase()).transaction(function(current) {
      // Abort if already owned by someone else
      if (current !== null && current !== user.uid) return; // undefined = abort
      return user.uid; // claim it
    }, function(err, committed, snap) {
      if (err) { setPtErr("Save failed: " + err.message); setPtSaving(false); return; }
      if (!committed) { setPtErr("That username is already taken by another player."); setPtSaving(false); return; }
      // Transaction succeeded — now release the old username and write profile in one batch
      var batch = {};
      if (currentUsername) batch["playerUsernames/" + currentUsername.toLowerCase()] = null;
      writeProfile(batch);
    });
  }

  return (
    <div style={{ padding:"28px" }}>
      <div style={{ maxWidth:440, margin:"0 auto", display:"flex", flexDirection:"column", gap:16 }}>

        {/* Account info card */}
        <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:14, padding:24, textAlign:"center" }}>

          <div style={{ fontSize:13, color:"#888", marginBottom:8 }}>{user.email}</div>
          <div onClick={function(){navigator.clipboard.writeText(user.uid)}} style={{ fontSize:11, color:"#555", marginBottom:12, cursor:"pointer", padding:"6px 10px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:6, fontFamily:"monospace", wordBreak:"break-all" }} title="Click to copy">UID: {user.uid}</div>
          {user.emailVerified ? (
            <div style={{ fontSize:12, color:"#4caf50", marginBottom:16, padding:"6px 10px", background:"rgba(76,175,80,0.1)", borderRadius:6 }}>✓ Email verified</div>
          ) : (
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:12, color:"#ef5350", marginBottom:8, padding:"6px 10px", background:"rgba(239,83,80,0.1)", borderRadius:6 }}>✗ Email not verified</div>
              <button onClick={function(){user.sendEmailVerification().then(function(){alert("Verification email sent!")})}} style={{ padding:"6px 14px", borderRadius:6, background:"rgba(255,107,53,0.15)", border:"1px solid rgba(255,107,53,0.3)", color:"#ff6b35", fontSize:11, fontWeight:600, cursor:"pointer" }}>Resend Verification Email</button>
            </div>
          )}
          <button onClick={onLogout} style={{ padding:"10px 24px", borderRadius:8, background:"rgba(239,83,80,0.15)", border:"1px solid rgba(239,83,80,0.3)", color:"#ef5350", fontSize:13, fontWeight:600, cursor:"pointer" }}>Sign Out</button>
        </div>

        {/* Player Tracker profile card */}
        <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:14, padding:24 }}>
          <div style={{ fontSize:14, fontWeight:700, color:"#fff", marginBottom:4 }}>🎮 Player Tracker Profile</div>
          <div style={{ fontSize:12, color:"#555", marginBottom:16 }}>Set a username so other players can search for and view your inventory in the Player Tracker tab.</div>

          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color:"#888", marginBottom:6, textTransform:"uppercase", letterSpacing:"0.05em" }}>Username</div>
            <input value={ptUsername} onChange={function(e){setPtUsername(e.target.value)}} placeholder="e.g. ProPlayer123"
              disabled={!canChange && !isUsernameUnchanged}
              style={{ width:"100%", padding:"10px 12px", background: (!canChange && !isUsernameUnchanged) ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, color: (!canChange && !isUsernameUnchanged) ? "#555" : "#eee", fontSize:13, outline:"none", boxSizing:"border-box" }} />
            <div style={{ fontSize:10, color:"#444", marginTop:4 }}>3–24 chars · letters, numbers, underscores only · unique to you</div>
          </div>

          {/* Cooldown notice */}
          {!isFirstSet && !canChange && (
            <div style={{ marginBottom:14, padding:"8px 12px", borderRadius:8, background:"rgba(255,183,77,0.1)", border:"1px solid rgba(255,183,77,0.25)", color:"#ffb74d", fontSize:12 }}>

function AuthPanel({ user, onClose }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [displayName, setDisplayName] = useState("");
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(null);

  function handleSignUp() {
    setError(null);
    if (!email || !password || !displayName) { setError("Please fill in all fields"); return; }
    if (password.length < 6) { setError("Password must be at least 6 characters"); return; }
    firebase.auth().createUserWithEmailAndPassword(email, password)
      .then(function(cred) {
        return cred.user.updateProfile({ displayName: displayName }).then(function() {
          var uid = cred.user.uid;
          return Promise.all([
            db.ref("users/" + uid + "/name").set(displayName),
            db.ref("users/" + uid + "/email").set(email),
            db.ref("users/" + uid + "/joined").set(Date.now())
          ]);
        }).then(function() {
          return cred.user.sendEmailVerification();
        });
      })
      .then(function() {
        firebase.auth().signOut();
        setSuccess("Account created! Check your email (and spam folder) to verify, then sign in.");
      })
      .catch(function(e) { setError(e.message); });
  }

  function handleLogin() {
    setError(null);
    if (!email || !password) { setError("Please fill in all fields"); return; }
    firebase.auth().signInWithEmailAndPassword(email, password)
      .then(function(cred) {
        if (!cred.user.emailVerified) {
          cred.user.sendEmailVerification();
          firebase.auth().signOut();
          setError("Email not verified yet. We sent a new verification link — check your inbox and spam folder.");
          return;
        }
        setSuccess("Signed in!");
        setTimeout(onClose, 800);
      })
      .catch(function(e) { setError(e.message); });
  }

  function handleLogout() {
    firebase.auth().signOut();
    onClose();
  }

  if (user) return (
    <AuthLoggedIn user={user} onLogout={handleLogout} />
  );

  return (
    <div style={{ padding:"28px" }}>
      <div style={{ background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:24,maxWidth:400,margin:"0 auto" }}>
        <h2 style={{ margin:"0 0 6px",fontSize:22,fontWeight:800,color:"#fff",textAlign:"center" }}>{mode === "signup" ? "Create Account" : "Sign In"}</h2>
        <p style={{ margin:"0 0 20px",fontSize:13,color:"#666",textAlign:"center" }}>{mode === "signup" ? "Sign up to enter giveaways" : "Welcome back"}</p>

        <div style={{ display:"flex",gap:8,marginBottom:20 }}>
          {[{id:"login",label:"Sign In"},{id:"signup",label:"Sign Up"}].map(function(t){return(
            <button key={t.id} onClick={function(){setMode(t.id);setError(null)}} style={{ flex:1,padding:"8px",borderRadius:8,background:mode===t.id?"rgba(255,107,53,0.15)":"rgba(255,255,255,0.04)",border:"1px solid "+(mode===t.id?"rgba(255,107,53,0.5)":"rgba(255,255,255,0.08)"),color:mode===t.id?"#ff6b35":"#888",fontSize:12,fontWeight:600,cursor:"pointer" }}>{t.label}</button>
          )})}
        </div>

        {mode === "signup" && (
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:11,color:"#888",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em" }}>Display Name</div>
            <input value={displayName} onChange={function(e){setDisplayName(e.target.value)}} placeholder="Your name"
              style={{ width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#eee",fontSize:13,outline:"none" }} />
          </div>
        )}

        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:11,color:"#888",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em" }}>Email</div>
          <input type="email" value={email} onChange={function(e){setEmail(e.target.value)}} placeholder="you@example.com"
            style={{ width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#eee",fontSize:13,outline:"none" }} />
        </div>

        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:11,color:"#888",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em" }}>Password</div>
          <input type="password" value={password} onChange={function(e){setPassword(e.target.value)}} placeholder="••••••••"
            style={{ width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#eee",fontSize:13,outline:"none" }} />
        </div>

        {error && <div style={{ marginBottom:12,padding:"8px 12px",borderRadius:8,background:"rgba(239,83,80,0.15)",color:"#ef5350",fontSize:12 }}>{error}</div>}
        {success && <div style={{ marginBottom:12,padding:"8px 12px",borderRadius:8,background:"rgba(76,175,80,0.15)",color:"#4caf50",fontSize:12 }}>{success}</div>}

        <button onClick={mode==="signup"?handleSignUp:handleLogin}
          style={{ width:"100%",padding:"12px",borderRadius:8,background:"#ff6b35",border:"none",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer" }}>

var GIVEAWAY_ITEMS = [
  {type:"weekly",label:"Weekly Giveaway",color:"#4fc3f7",duration:7*24*60*60*1000},
  {type:"biweekly",label:"Bi-Weekly Giveaway",color:"#ce93d8",duration:14*24*60*60*1000},
  {type:"monthly",label:"Monthly Giveaway",color:"#ffd700",duration:30*24*60*60*1000}
];

// Giveaway items are pinned by name so price updates never change what's being given away.
// To change a giveaway item, update the name here — it no longer depends on live prices.
var GIVEAWAY_PINNED = {
  weekly: "Sticker \"Province\"",
  biweekly: "AKR \"Scylla\" StatTrack",
  monthly: "S2 Mantis \"Ink Wash\""
};

function getGiveawayItem(gType) {
  var pinnedName = GIVEAWAY_PINNED[gType];
  var item = ITEMS.find(function(i){ return i.name === pinnedName; });
  if (item) return item;
  // Fallback only if the pinned item is ever removed from ITEMS
  var pool = ITEMS.slice(0, 50);
  return pool[0];
}

function getEndTime(gType) {
  var dur = gType==="weekly"?604800000:gType==="biweekly"?1209600000:2592000000;
  var epoch = new Date("2026-06-04").getTime();
  var now = Date.now();
  var elapsed = now - epoch;
  var periods = Math.floor(elapsed / dur);
  return epoch + (periods + 1) * dur;
}

function GiveawaysTab({ user, tier }) {
  const [now, setNow] = useState(Date.now());
  const [entries, setEntries] = useState({});
  const [winners, setWinners] = useState({});

  React.useEffect(function() {
    var iv = setInterval(function(){ setNow(Date.now()); }, 1000);
    return function(){ clearInterval(iv); };
  }, []);

  React.useEffect(function() {
    GIVEAWAY_ITEMS.forEach(function(g) {
      db.ref("giveaways/" + g.type + "/entries").on("value", function(snap) {
        var data = snap.val() || {};
        setEntries(function(prev) { var n = Object.assign({}, prev); n[g.type] = data; return n; });
      });
      db.ref("giveaways/" + g.type + "/lastWinner").on("value", function(snap) {
        setWinners(function(prev) { var n = Object.assign({}, prev); n[g.type] = snap.val(); return n; });
      });
    });
  }, []);

  React.useEffect(function() {
    GIVEAWAY_ITEMS.forEach(function(g) {
      var endTime = getEndTime(g.type);
      if (now >= endTime) {
        var entryData = entries[g.type] || {};
        var names = [];
        Object.keys(entryData).forEach(function(uid) {
          var e = entryData[uid];
          for (var i = 0; i < (e.tickets || 1); i++) names.push(e.name);
        });
        if (names.length > 0) {
          var winner = names[Math.floor(Math.random() * names.length)];
          db.ref("giveaways/" + g.type + "/lastWinner").set(winner);
          db.ref("giveaways/" + g.type + "/entries").remove();
        }
      }
    });
  }, [now]);

  function handleEnter(gType) {
    if (!user) return;
    var tickets = tier==="VIP+"?100:tier==="VIP"?25:tier==="Basic"?10:1;
    db.ref("giveaways/" + gType + "/entries/" + user.uid).set({
      name: user.displayName || user.email,
      tickets: tickets,
      ts: Date.now()
    });
  }

  function formatCountdown(ms) {
    if (ms <= 0) return "Selecting winner...";
    var d = Math.floor(ms/86400000);
    var h = Math.floor((ms%86400000)/3600000);
    var m = Math.floor((ms%3600000)/60000);
    var s = Math.floor((ms%60000)/1000);
    var parts = [];
    if (d > 0) parts.push(d + "d");
    parts.push(h + "h");
    parts.push(m + "m");
    parts.push(s + "s");
    return parts.join(" ");
  }

  var tickets = tier==="VIP+"?100:tier==="VIP"?25:tier==="Basic"?10:1;

  return (
    <div style={{ padding:"28px" }}>
      <h2 style={{ margin:"0 0 6px",fontSize:22,fontWeight:800,color:"#fff" }}>Giveaways</h2>
      <p style={{ margin:"0 0 8px",fontSize:13,color:"#666" }}>Enter for a chance to win in-game items. Higher tiers get more tickets!</p>
      <p style={{ margin:"0 0 14px",fontSize:11,color:"#ff6b35",background:"rgba(255,107,53,0.08)",padding:"8px 12px",borderRadius:8,border:"1px solid rgba(255,107,53,0.15)" }}>🏆 If you win you will receive an email with details on how to receive your prize in game</p>
      <div style={{ marginBottom:24,display:"flex",gap:12,flexWrap:"wrap" }}>
        {[{t:"Free",v:1,c:"#888"},{t:"Basic",v:10,c:"#ef5350"},{t:"VIP",v:25,c:"#6690ff"},{t:"VIP+",v:100,c:"#ffd700"}].map(function(x){return(
          <span key={x.t} style={{ fontSize:11,padding:"4px 10px",borderRadius:20,background:tier===x.t?x.c+"33":x.c+"11",border:"1px solid "+(tier===x.t?x.c:x.c+"44"),color:x.c,fontWeight:tier===x.t?700:400 }}>{x.t}: {x.v} ticket{x.v!==1?"s":""}{tier===x.t?" ✓":""}</span>
        )})}
      </div>

      <div className="s2-giveaways" style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16 }}>
        {GIVEAWAY_ITEMS.map(function(g) {
          var item = getGiveawayItem(g.type);
          var endTime = getEndTime(g.type);
          var remaining = endTime - now;
          var entryData = entries[g.type] || {};
          var entryCount = Object.keys(entryData).length;
          var hasEntered = user && entryData[user.uid];
          var lastWinner = winners[g.type];
          var rc = RC[item.rarity] || "#888";
          var rb = RB[item.rarity] || "rgba(128,128,128,0.12)";

          return (
            <div key={g.type} style={{ background:"rgba(255,255,255,0.03)",border:"1px solid "+g.color+"33",borderRadius:14,padding:20,display:"flex",flexDirection:"column" }}>
              <div style={{ fontSize:13,fontWeight:700,color:g.color,letterSpacing:"0.03em",marginBottom:12 }}>{g.label}</div>

              <div style={{ background:"rgba(0,0,0,0.3)",borderRadius:10,padding:16,marginBottom:12,textAlign:"center",position:"relative",overflow:"hidden" }}>
                <div style={{ position:"absolute",inset:0,background:"radial-gradient(circle at 50% 40%, "+rc+"22 0%, transparent 70%)",pointerEvents:"none" }} />
                <div style={{ fontSize:48,marginBottom:8,filter:"drop-shadow(0 0 12px "+rc+"66)" }}>{
                  item.type==="Knife"?"🔪":item.type==="Weapon Skin"?"🔫":item.type==="Gloves"?"🧤":item.type==="Case"||item.type==="Knife Case"||item.type==="Weapon Case"?"📦":item.type==="Sticker"||item.type==="Sticker Pack"?"🏷️":item.type==="Graffiti"||item.type==="Graffiti Pack"?"🎨":item.type==="Charm"?"✨":"🎁"
                }</div>
                <span style={{ fontSize:10,padding:"2px 8px",borderRadius:20,background:rb,color:rc,border:"1px solid "+rc+"33" }}>{item.rarity}</span>
                <div style={{ fontSize:15,fontWeight:700,color:"#fff",margin:"8px 0 4px" }}>{item.name}</div>
                <div style={{ fontSize:18,fontWeight:800,color:"#fff",fontFamily:"monospace" }}>{fmtPrice(item.price)} G</div>

              <div style={{ textAlign:"center",marginBottom:12 }}>
                <div style={{ fontSize:10,color:"#666",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4 }}>Ends in</div>
                <div style={{ fontSize:18,fontWeight:800,color:g.color,fontFamily:"monospace" }}>{formatCountdown(remaining)}</div>
              </div>


              {!user ? (
                <div style={{ textAlign:"center",fontSize:12,color:"#666",padding:"8px",background:"rgba(255,255,255,0.02)",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)" }}>Sign in to enter</div>
              ) : hasEntered ? (
                <div style={{ textAlign:"center",fontSize:12,color:"#4caf50",padding:"10px",background:"rgba(76,175,80,0.1)",borderRadius:8,border:"1px solid rgba(76,175,80,0.2)",fontWeight:600 }}>✓ Entered ({tickets} ticket{tickets!==1?"s":""})</div>
              ) : (
                <button onClick={function(){handleEnter(g.type)}} style={{ width:"100%",padding:"10px",borderRadius:8,background:g.color+"22",border:"1px solid "+g.color+"66",color:g.color,fontSize:13,fontWeight:700,cursor:"pointer" }}>Enter ({tickets} ticket{tickets!==1?"s":""})</button>
              )}

              {lastWinner && (

                  <div style={{ fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em" }}>Last Winner</div>
                  <div style={{ fontSize:13,fontWeight:700,color:"#ffd700",marginTop:2 }}>🏆 {lastWinner}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ marginTop:20,padding:16,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,fontSize:11,color:"#555",textAlign:"center" }}>
        Winners are selected randomly. More tickets = higher chance. Items are delivered in-game.
      </div>
    </div>
  );
}

function savePriceSnapshot() {
  var today = new Date().toISOString().split("T")[0];
  var snapshot = {};
  ITEMS.forEach(function(item) {
    var key = item.name.replace(/[.#$/\[\]]/g, "_");
    snapshot[key] = { p: item.price, d: item.day, w: item.week, m: item.month, y: item.year };
  });
  return db.ref("priceHistory/" + today).set(snapshot);
}

function PriceHistoryAdmin() {
  var [saving, setSaving] = React.useState(false);
  var [saved, setSaved] = React.useState("");
  var [snapshots, setSnapshots] = React.useState([]);

  React.useEffect(function() {
    db.ref("priceHistory").orderByKey().limitToLast(30).once("value", function(snap) {
      var data = snap.val() || {};
      setSnapshots(Object.keys(data).sort().reverse());
    });
  }, []);

  function handleSave() {
    setSaving(true);
    savePriceSnapshot().then(function() {
      var today = new Date().toISOString().split("T")[0];
      setSaved("Saved " + ITEMS.length + " prices for " + today);
      setSaving(false);
      setSnapshots(function(prev) { return [today].concat(prev.filter(function(d){return d!==today})); });
    }).catch(function(e) {
      setSaved("Error: " + e.message);
      setSaving(false);
    });
  }

  return (
    <div>
      <h3 style={{ margin:"0 0 12px",fontSize:16,fontWeight:700,color:"#fff" }}>📊 Price History</h3>
      <p style={{ margin:"0 0 16px",fontSize:12,color:"#666" }}>Save a daily price snapshot to Firebase. The graph will use real data for saved dates.</p>
      <button onClick={handleSave} disabled={saving} style={{ padding:"10px 20px",borderRadius:8,background:saving?"rgba(255,255,255,0.05)":"linear-gradient(135deg,#ff6b35,#f7931e)",border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:saving?"wait":"pointer",marginBottom:16 }}>
        {saving ? "Saving..." : "💾 Save Today's Prices"}
      </button>
      {saved && <div style={{ padding:10,background:"rgba(76,175,80,0.1)",border:"1px solid rgba(76,175,80,0.3)",borderRadius:8,color:"#4caf50",fontSize:12,marginBottom:16 }}>{saved}</div>}
      <div style={{ fontSize:13,fontWeight:600,color:"#aaa",marginBottom:8 }}>Saved Snapshots ({snapshots.length})</div>
      {snapshots.length === 0 && <div style={{ color:"#555",fontSize:12 }}>No snapshots yet. Save your first one!</div>}
      {snapshots.map(function(date) {
        return <div key={date} style={{ padding:"6px 12px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,marginBottom:4,fontSize:12,color:"#888" }}>📅 {date}</div>;
      })}
    </div>
  );
}

function useInventory() {
  var stored = localStorage.getItem('s2_inventory');
  var initial = stored ? JSON.parse(stored) : [];
  var ref = React.useState(initial);
  var inv = ref[0]; var setInv = ref[1];
  function save(items) { setInv(items); localStorage.setItem('s2_inventory', JSON.stringify(items)); }
  function addItem(name, qty) {
    var existing = inv.find(function(i){return i.name===name});
    var item = ITEMS.find(function(i){return i.name===name});
    if(!item) return;
    if(existing) {
      save(inv.map(function(i){return i.name===name?Object.assign({},i,{qty:i.qty+qty}):i}));
    } else {
      save(inv.concat([{name:name,qty:qty,addedPrice:item.price,addedDate:Date.now()}]));
    }
  }
  function removeItem(name) { save(inv.filter(function(i){return i.name!==name})); }
  function updateQty(name, qty) {
    if(qty<=0) return removeItem(name);
    save(inv.map(function(i){return i.name===name?Object.assign({},i,{qty:qty}):i}));
  }
  return {items:inv, addItem:addItem, removeItem:removeItem, updateQty:updateQty};
}

function InventoryPanel({ lang, setTab, setSelected, setGraphItem, user }) {
  var inv = useInventory();
  var items = inv.items;
  var [addSearch, setAddSearch] = React.useState("");
  var [showAdd, setShowAdd] = React.useState(false);
  var [addQty, setAddQty] = React.useState(1);

  // AI screenshot import state
  var [imgFile, setImgFile] = React.useState(null);
  var [imgPreview, setImgPreview] = React.useState(null);
  var [scanning, setScanning] = React.useState(false);
  var [scanResults, setScanResults] = React.useState(null);
  var [scanErr, setScanErr] = React.useState("");
  var [confirmItems, setConfirmItems] = React.useState([]);
  var [showConfirm, setShowConfirm] = React.useState(false);
  var fileInputRef = React.useRef(null);

  function handleImageSelect(e) {
    var file = e.target.files[0]; if (!file) return;
    setImgFile(file); setScanResults(null); setScanErr(""); setShowConfirm(false);
    var reader = new FileReader();
    reader.onload = function(ev) { setImgPreview(ev.target.result); };
    reader.readAsDataURL(file);
  }

  async function handleScan() {
    if (!imgFile) return;
    setScanning(true); setScanErr(""); setScanResults(null); setShowConfirm(false);
    try {
      var base64 = await new Promise(function(res, rej) {
        var r = new FileReader();
        r.onload = function(e) { res(e.target.result.split(",")[1]); };
        r.onerror = function() { rej(new Error("Read failed")); };
        r.readAsDataURL(imgFile);
      });
      var response = await fetch("/.netlify/functions/scan-inventory", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: imgFile.type || "image/jpeg", data: base64 } },
              { type: "text", text: "This is a screenshot from the mobile game Standoff 2. Identify all visible inventory items. For each item return its exact name and quantity (default 1 if not shown). Return ONLY a JSON array, no markdown, no other text: [{\"name\": \"item name\", \"qty\": 1}]. If no items visible return []." }
            ]
          }]
        })
      });
      var data = await response.json();
      if (data.error) throw new Error(data.error.message);
      var text = (data.content || []).map(function(c){return c.text||""}).join("").trim().replace(/```json|```/g,"").trim();
      var parsed = JSON.parse(text);
      if (!Array.isArray(parsed)) throw new Error("Unexpected format");
      var matched = parsed.map(function(r) {
        var exact = ITEMS.find(function(i){return i.name.toLowerCase()===(r.name||"").toLowerCase()});
        var fuzzy = !exact ? ITEMS.find(function(i){return i.name.toLowerCase().indexOf((r.name||"").toLowerCase())>-1||(r.name||"").toLowerCase().indexOf(i.name.toLowerCase())>-1}) : null;
        var item = exact || fuzzy;
        return { raw: r.name, matched: item?item.name:null, qty: r.qty||1, item: item||null, include: !!item };
      });
      setScanResults(matched);
      setConfirmItems(matched.filter(function(m){return m.include}).map(function(m){return{name:m.matched,qty:m.qty}}));
      setShowConfirm(true);
    } catch(err) { setScanErr("Scan failed: " + err.message + ". Try a clearer screenshot with item names visible."); }
    setScanning(false);
  }

  function importConfirmedItems() {
    confirmItems.forEach(function(ci){ if(ci.name&&ci.qty>0) inv.addItem(ci.name, ci.qty); });
    setShowConfirm(false); setScanResults(null); setImgFile(null); setImgPreview(null); setScanErr("");
    alert("✓ " + confirmItems.length + " item(s) imported!");
  }

  // Mirror inventory to Firebase so Player Tracker search can read it
  React.useEffect(function() {
    if (!user || items.length === 0) return;
    var update = {};
    items.forEach(function(i) { update[i.name.replace(/[.#$\/\[\]]/g, "_")] = i; });
    db.ref("playerInventories/" + user.uid).set(update);
    // Daily value snapshot
    var today = new Date().toISOString().slice(0, 10);
    var total = items.reduce(function(sum, invItem) {
      var market = ITEMS.find(function(i) { return i.name === invItem.name; });
      return sum + (market ? market.price * invItem.qty : 0);
    }, 0);
    db.ref("playerValueHistory/" + user.uid + "/" + today).set(Math.round(total * 100) / 100);
  }, [items.length, user && user.uid]);

  var totalValue = 0; var totalAdded = 0; var totalDay = 0; var totalWeek = 0; var totalMonth = 0;
  var enriched = items.map(function(invItem) {
    var market = ITEMS.find(function(i){return i.name===invItem.name});
    if(!market) return null;
    var currentVal = market.price * invItem.qty;
    var addedVal = invItem.addedPrice * invItem.qty;
    totalValue += currentVal;
    totalAdded += addedVal;
    totalDay += (market.price * market.day / 100) * invItem.qty;
    totalWeek += (market.price * market.week / 100) * invItem.qty;
    totalMonth += (market.price * market.month / 100) * invItem.qty;
    return Object.assign({}, invItem, {market:market, currentVal:currentVal, addedVal:addedVal, pnl:currentVal-addedVal});
  }).filter(Boolean);

  var pnlPct = totalAdded > 0 ? ((totalValue - totalAdded) / totalAdded * 100) : 0;
  var dayPct = totalValue > 0 ? (totalDay / totalValue * 100) : 0;
  var weekPct = totalValue > 0 ? (totalWeek / totalValue * 100) : 0;
  var monthPct = totalValue > 0 ? (totalMonth / totalValue * 100) : 0;

  var filtered = ITEMS.filter(function(i){
    if(!addSearch) return false;
    return i.name.toLowerCase().indexOf(addSearch.toLowerCase()) > -1;
  }).slice(0,8);

  return (
    <div style={{ padding:28 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }}>
        <div>
          <h2 style={{ margin:"0 0 4px",fontSize:22,fontWeight:800,color:"#fff" }}>📦 {t("myInventory",lang)}</h2>
          <p style={{ margin:0,fontSize:12,color:"#555" }}>{items.length} item{items.length!==1?"s":""}</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={function(){if(fileInputRef.current)fileInputRef.current.click()}} style={{ padding:"8px 14px",borderRadius:8,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",color:"#ccc",fontSize:12,fontWeight:600,cursor:"pointer" }}>📷 Import Screenshot</button>
          <button onClick={function(){setShowAdd(!showAdd)}} style={{ padding:"8px 16px",borderRadius:8,background:"#ff6b35",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer" }}>{t("addToInventory",lang)}</button>
        </div>
        <input ref={fileInputRef} type="file" accept="image/*" onChange={handleImageSelect} style={{ display:"none" }} />
      </div>

      {/* AI Screenshot scan flow */}
      {imgPreview && (

function scoreItem(item) {
  var score = 0;
  // Momentum: positive changes across all timeframes (weighted by recency)
  if (item.day > 0) score += Math.min(item.day * 3, 30);
  if (item.week > 0) score += Math.min(item.week * 1.5, 40);
  if (item.month > 0) score += Math.min(item.month * 0.8, 35);
  if (item.year > 0) score += Math.min(item.year * 0.3, 25);
  // Acceleration: short-term growth exceeding long-term = bullish signal
  if (item.week > item.month && item.month > 0) score += 15;
  if (item.day > item.week && item.week > 0) score += 10;
  // Consistency: all positive timeframes = strong
  var positives = (item.day > 0 ? 1 : 0) + (item.week > 0 ? 1 : 0) + (item.month > 0 ? 1 : 0) + (item.year > 0 ? 1 : 0);
  score += positives * 8;
  // Low spread = more liquid, better for trading
  if (item.spread < 15) score += 12;
  else if (item.spread < 30) score += 6;
  // Moderate volatility: 5-40% is ideal (not stagnant, not too wild)
  if (item.vol >= 5 && item.vol <= 40) score += 10;
  else if (item.vol > 40) score -= 5;
  // Price penalty: very cheap items (<1G) are unreliable
  if (item.price < 1) score -= 20;
  else if (item.price >= 5 && item.price <= 50000) score += 5;
  return Math.round(score * 10) / 10;
}

function getSignal(score) {
  if (score >= 80) return { label: "Strong Buy", color: "#00e676", icon: "🟢" };
  if (score >= 55) return { label: "Buy", color: "#4caf50", icon: "🟢" };
  if (score >= 35) return { label: "Hold", color: "#ffb74d", icon: "🟡" };
  if (score >= 15) return { label: "Watch", color: "#ff9800", icon: "🟠" };
  return { label: "Avoid", color: "#ef5350", icon: "🔴" };
}

// Analyse real price history to compute smarter signals not available from the DataTables feed
function analyseHistory(hist) {
  var dates = Object.keys(hist).sort();
  if (dates.length < 7) return null;
  var prices = dates.map(function(d) { return hist[d]; });
  var latest = prices[prices.length - 1];
  var min30 = Math.min.apply(null, prices.slice(-30));
  var max30 = Math.max.apply(null, prices.slice(-30));
  var avg30 = prices.slice(-30).reduce(function(a,b){return a+b;},0) / Math.min(prices.length, 30);
  // Recovery: hit a 30-day low in the past 7 days but is now higher
  var recentMin = Math.min.apply(null, prices.slice(-7));
  var olderMin  = Math.min.apply(null, prices.slice(-30, -7));
  var hitLow    = recentMin <= min30 * 1.05;
  var recovered = latest > recentMin * 1.08;
  // Dip: currently below 30-day avg by >10%, could be a buy
  var isBelowAvg = latest < avg30 * 0.90;
  // Breakout: last 3 days all higher than the 14-day avg before them
  var avg14pre = prices.slice(-17, -3).reduce(function(a,b){return a+b;},0) / 14;
  var last3above = prices.slice(-3).every(function(p){return p > avg14pre * 1.05;});
  // Range position: where current price sits in the 30-day range (0=bottom, 1=top)
  var rangePct = max30 > min30 ? (latest - min30) / (max30 - min30) : 0.5;
  return { hitLow:hitLow, recovered:recovered, isBelowAvg:isBelowAvg, last3above:last3above, rangePct:rangePct, min30:min30, avg30:avg30, dataPoints:dates.length };
}

function InvSortedList({ inventory }) {
  var [invSort, setInvSort] = React.useState("value");
  var sortOptions = [
    { id:"value", label:"Value" },
    { id:"price", label:"Price" },
    { id:"qty",   label:"Qty" },
    { id:"rarity",label:"Rarity" },
    { id:"name",  label:"Name" },
  ];
  var rarityRank = { Immortal:0, Arcane:1, Legendary:2, Epic:3, Rare:4, Uncommon:5, Common:6 };

  var sorted = inventory.slice().sort(function(a, b) {
    var ma = ITEMS.find(function(i){return i.name===a.name});
    var mb = ITEMS.find(function(i){return i.name===b.name});
    if (invSort === "value")  return (mb?(mb.price*b.qty):0) - (ma?(ma.price*a.qty):0);
    if (invSort === "price")  return (mb?mb.price:0) - (ma?ma.price:0);
    if (invSort === "qty")    return b.qty - a.qty;
    if (invSort === "rarity") { var ra = rarityRank[ma&&ma.rarity]; var rb = rarityRank[mb&&mb.rarity]; if(ra===undefined)ra=99; if(rb===undefined)rb=99; return ra-rb; }
    if (invSort === "name")   return a.name.localeCompare(b.name);
    return 0;
  });

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em" }}>Inventory ({inventory.length} items)</div>
        <div style={{ display:"flex", gap:4 }}>
          {sortOptions.map(function(opt) {
            return (
              <button key={opt.id} onClick={function(){setInvSort(opt.id)}}
                style={{ padding:"3px 8px", borderRadius:5, background:invSort===opt.id?"rgba(255,107,53,0.2)":"rgba(255,255,255,0.04)", border:"1px solid "+(invSort===opt.id?"rgba(255,107,53,0.5)":"rgba(255,255,255,0.08)"), color:invSort===opt.id?"#ff6b35":"#666", fontSize:10, fontWeight:600, cursor:"pointer" }}>
                {opt.label}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:6, maxHeight:400, overflowY:"auto" }}>
        {sorted.map(function(invItem) {
          var market = ITEMS.find(function(i){return i.name===invItem.name}); if(!market)return null;
          var rc = RC[market.rarity]||"#888"; var img = ITEM_IMAGES[invItem.name];
          return (
            <div key={invItem.name} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:8 }}>
              {img && <img src={img} alt="" style={{ width:32, height:22, objectFit:"contain", borderRadius:3, flexShrink:0 }} />}
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:12, color:"#eee", fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{invItem.name}</div>
                <div style={{ fontSize:10, color:rc }}>{market.rarity}</div>
              </div>
              <div style={{ textAlign:"right", flexShrink:0 }}>
                <div style={{ fontSize:12, color:"#fff", fontFamily:"monospace" }}>{fmtPrice(market.price*invItem.qty)} G</div>
                <div style={{ fontSize:10, color:"#555" }}>×{invItem.qty} @ {fmtPrice(market.price)}</div>
              </div>
            </div>
          );
        }).filter(Boolean)}
      </div>
    </div>
  );
}

function ProfileInventoryView({ inventory, vhist }) {
  function calcTotal(inv) {
    return inv.reduce(function(sum, invItem) {
      var market = ITEMS.find(function(i) { return i.name === invItem.name; });
      return sum + (market ? market.price * invItem.qty : 0);
    }, 0);
  }
  var total = calcTotal(inventory);
  var byRarity = {};
  inventory.forEach(function(invItem) {
    var market = ITEMS.find(function(i) { return i.name === invItem.name; });
    if (!market) return;
    if (!byRarity[market.rarity]) byRarity[market.rarity] = { count: 0, value: 0 };
    byRarity[market.rarity].count += invItem.qty;
    byRarity[market.rarity].value += market.price * invItem.qty;
  });
  var rarityOrder = ["Immortal","Arcane","Legendary","Epic","Rare","Uncommon","Common"];

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:20 }}>
        {[
          { label:"Total Value", val: fmtPrice(total) + " G" },
          { label:"Items", val: inventory.reduce(function(s,i){return s+i.qty},0) },
          { label:"Unique Skins", val: inventory.length }
        ].map(function(s) { return (
          <div key={s.label} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:12, padding:"14px 16px" }}>
            <div style={{ fontSize:10, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:6 }}>{s.label}</div>
            <div style={{ fontSize:18, fontWeight:700, color:"#fff", fontFamily:"monospace" }}>{s.val}</div>
          </div>
        ); })}
      </div>

      {vhist && vhist.length >= 2 && (
        <div style={{ marginBottom:20, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:12, padding:16 }}>
          <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:10 }}>Portfolio Value History</div>
          <svg viewBox="0 0 400 80" style={{ width:"100%", height:80 }}>
            {(function() {
              var prices = vhist.map(function(p){return p.total});
              var minP = Math.min.apply(null,prices), maxP = Math.max.apply(null,prices);
              var pad = (maxP-minP)*0.1 || maxP*0.1 || 1;
              var W=400,H=80;
              function xOf(i){return i/(vhist.length-1)*W}
              function yOf(v){return H-((v-(minP-pad))/(maxP+pad-(minP-pad)))*H}
              var path=vhist.map(function(p,i){return(i===0?"M":"L")+xOf(i).toFixed(1)+" "+yOf(p.total).toFixed(1)}).join(" ");
              var isUp=prices[prices.length-1]>=prices[0]; var color=isUp?"#4caf50":"#ef5350";
              return [
                React.createElement("defs",{key:"d"},React.createElement("linearGradient",{id:"pvhg",x1:"0",y1:"0",x2:"0",y2:"1"},React.createElement("stop",{offset:"0%",stopColor:color,stopOpacity:"0.3"}),React.createElement("stop",{offset:"100%",stopColor:color,stopOpacity:"0.02"}))),
                React.createElement("path",{key:"a",d:path+" L "+W+" "+H+" L 0 "+H+" Z",fill:"url(#pvhg)"}),
                React.createElement("path",{key:"l",d:path,fill:"none",stroke:color,strokeWidth:"2"})
              ];
            })()}
          </svg>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#444", marginTop:4 }}>
            <span>{vhist[0].date}</span><span>{vhist[vhist.length-1].date}</span>
          </div>
        </div>
      )}

      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:10 }}>By Rarity</div>
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {rarityOrder.filter(function(r){return byRarity[r]}).map(function(r) {
            var rc=RC[r]||"#888"; var pct=total>0?(byRarity[r].value/total*100):0;
            return (
              <div key={r} style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:11, color:rc, width:80, flexShrink:0 }}>{r}</span>
                <div style={{ flex:1, height:6, background:"rgba(255,255,255,0.05)", borderRadius:3, overflow:"hidden" }}>
                  <div style={{ width:pct+"%", height:"100%", background:rc, borderRadius:3 }} />
                </div>
                <span style={{ fontSize:11, color:"#666", width:70, textAlign:"right", flexShrink:0 }}>{fmtPrice(byRarity[r].value)} G</span>
                <span style={{ fontSize:10, color:"#444", width:24, flexShrink:0 }}>×{byRarity[r].count}</span>
              </div>
            );
          })}
        </div>
      </div>

      <InvSortedList inventory={inventory} />
    </div>
  );
}

function PlayerTrackerPanel({ user, tier, setTab }) {
  var [searchQ, setSearchQ] = React.useState("");
  var [foundProfile, setFoundProfile] = React.useState(null);
  var [searchErr, setSearchErr] = React.useState("");
  var [searching, setSearching] = React.useState(false);

  function handleSearch() {
    if (!searchQ.trim()) return;
    setSearching(true); setSearchErr(""); setFoundProfile(null);
    db.ref("playerUsernames/" + searchQ.trim().toLowerCase()).once("value", function(snap) {
      var uid = snap.val();
      if (!uid) { setSearchErr("Player not found. They may not have set up a Player Tracker profile yet."); setSearching(false); return; }
      db.ref("playerProfiles/" + uid).once("value", function(psnap) {
        var profile = psnap.val();
        if (!profile || profile.public === false) { setSearchErr("This profile is set to private."); setSearching(false); return; }
        db.ref("playerInventories/" + uid).once("value", function(isnap) {
          var invData = isnap.val() || {};
          var inv = Object.keys(invData).map(function(k) { return invData[k]; });
          db.ref("playerValueHistory/" + uid).orderByKey().limitToLast(30).once("value", function(vsnap) {
            var vdata = vsnap.val() || {};
            var vpts = Object.keys(vdata).sort().map(function(d) { return { date: d, total: vdata[d] }; });
            setFoundProfile({ profile: profile, inventory: inv, valueHistory: vpts });
            setSearching(false);
          });
        });
      });
    });
  }

  return (
    <div style={{ padding:28 }}>
      <div style={{ marginBottom:24 }}>
        <h2 style={{ margin:"0 0 4px", fontSize:22, fontWeight:800, color:"#fff" }}>🎮 Player Tracker</h2>

      <div style={{ display:"flex", gap:10, marginBottom:20 }}>
        <input value={searchQ} onChange={function(e){setSearchQ(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")handleSearch()}} placeholder="Enter player username..."
          style={{ flex:1, padding:"10px 14px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, color:"#eee", fontSize:13, outline:"none" }} />
        <button onClick={handleSearch} disabled={searching||!searchQ.trim()} style={{ padding:"10px 20px", borderRadius:8, background:searching||!searchQ.trim()?"rgba(255,255,255,0.05)":"#ff6b35", border:"none", color:searching||!searchQ.trim()?"#555":"#fff", fontSize:13, fontWeight:700, cursor:searching||!searchQ.trim()?"not-allowed":"pointer" }}>
          {searching ? "Searching..." : "Search"}

          <div style={{ width:36,height:42,display:"flex",alignItems:"center",justifyContent:"center" }}><svg viewBox="0 0 36 42" width="36" height="42"><defs><linearGradient id="hsg" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0%" stopColor="#ff8a47"/><stop offset="100%" stopColor="#e85d15"/></linearGradient><linearGradient id="hig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#1a1a20"/><stop offset="100%" stopColor="#12121a"/></linearGradient></defs><path d="M18 1 L33 5 L34 17 Q34 34 18 40 Q2 34 2 17 L3 5 Z" fill="url(#hsg)"/><path d="M18 4 L31 7.5 L32 17 Q32 32 18 37 Q4 32 4 17 L5 7.5 Z" fill="url(#hig)"/><g transform="translate(18,14)"><g transform="rotate(-45)"><rect x="-1.5" y="-9" width="3" height="12" rx="1" fill="#ff8a47"/><rect x="-2.5" y="-10" width="5" height="2.5" rx="0.5" fill="#ffa866"/><rect x="-3.5" y="2" width="7" height="1.5" rx="0.5" fill="#ffa866"/></g><g transform="rotate(45)"><rect x="-1.5" y="-9" width="3" height="12" rx="1" fill="#ff8a47"/><rect x="-2.5" y="-10" width="5" height="2.5" rx="0.5" fill="#ffa866"/><rect x="-3.5" y="2" width="7" height="1.5" rx="0.5" fill="#ffa866"/></g></g><text x="18" y="24" fontFamily="Arial" fontWeight="900" fontSize="10" fill="#fff" textAnchor="middle" dominantBaseline="central">S2</text></svg></div>

            <div style={{ fontSize:16,fontWeight:800,color:"#fff",letterSpacing:"0.05em" }}>{siteConfig.siteTitle || "STANDOFF 2"}</div>
            <div style={{ fontSize:11,color:"#666",letterSpacing:"0.1em" }}>MARKET TRACKER</div>
          </div>
        </div>
        <div className="s2-header-right" style={{ display:"flex",alignItems:"center",gap:12 }}>
          <div style={{ fontSize:10,color:"#444" }}>Updated: {siteConfig.lastUpdated || __latestPriceDate || "Loading…"}</div>
          <select value={lang} onChange={function(e){changeLang(e.target.value)}} style={{ padding:"5px 8px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,color:"#ccc",fontSize:11,cursor:"pointer" }}>
            {Object.keys(LANGS).map(function(l){return <option key={l} value={l}>{LANGS[l].flag} {LANGS[l].name}</option>})}
          </select>
          <button onClick={function(){setShowFeedback(true)}} style={{ padding:"6px 14px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,color:"#aaa",fontSize:11,fontWeight:600,letterSpacing:"0.05em",cursor:"pointer" }}>{t("feedback",lang)}</button>
          <button onClick={function(){setShowSupport(true)}} style={{ padding:"6px 14px",background:"linear-gradient(135deg,#ff6b35,#f7931e)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:700,letterSpacing:"0.05em",cursor:"pointer" }}>{t("support",lang)}</button>
        </div>
      </div>

      <div className="s2-tabs" style={{ display:"flex",gap:0,borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
        {[{id:"market",label:t("market",lang)},{id:"investments",label:t("bestInvestments",lang)},{id:"inventory",label:"📦 "+t("myInventory",lang)},{id:"players",label:"🎮 Player Tracker"}].concat(siteConfig.giveawaysEnabled?[{id:"giveaways",label:t("giveaways",lang)}]:[]).concat([{id:"account",label:user?"👤 "+(user.displayName||"Account"):t("signUp",lang)}]).concat(showAdmin?[{id:"admin",label:"⚙ Admin"}]:[]).map(function(t){return(
          <button key={t.id} onClick={function(){setTab(t.id)}} style={{ padding:"12px 24px",background:tab===t.id?"rgba(255,255,255,0.05)":"transparent",border:"none",borderBottom:tab===t.id?"2px solid #ff6b35":"2px solid transparent",color:tab===t.id?"#fff":"#666",fontSize:13,fontWeight:600,cursor:"pointer",letterSpacing:"0.03em" }}>{t.label}</button>
        )})}
      </div>

      {tab === "investments" && (
        <div style={{ padding:"28px" }}>
          <h2 style={{ margin:"0 0 6px",fontSize:22,fontWeight:800,color:"#fff" }}>{t("bestInvestments",lang)}</h2>
          <p style={{ margin:"0 0 24px",fontSize:13,color:"#666" }}>AI-scored predictions based on momentum, volatility, spread, and price trends</p>

          <InvestmentPanel setTab={setTab} setSelected={setSelected} setGraphItem={setGraphItem} lang={lang} />

          <div style={{ padding:16,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,fontSize:11,color:"#555",textAlign:"center" }}>
            {t("disclaimer",lang)}
          </div>
        </div>
      )}

      {tab === "inventory" && <InventoryPanel lang={lang} setTab={setTab} setSelected={setSelected} setGraphItem={setGraphItem} user={user} />}

      {tab === "players" && <PlayerTrackerPanel user={user} tier={tier} setTab={setTab} />}

      {tab === "giveaways" && <GiveawaysTab user={user} tier={tier} />}

      {tab === "account" && <AuthPanel user={user} onClose={function(){setTab("market")}} />}

      {tab === "admin" && showAdmin && <AdminPanel user={user} />}

      {tab === "market" && (<div>
      <div className="s2-stats" style={{ padding:"20px 28px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12 }}>
        {[
          {label:t("itemsTracked",lang),value:totalItems.toLocaleString(),sub:""},
          {label:t("avg24h",lang),value:(parseFloat(avgDay)>=0?"+":"")+avgDay+"%",sub:"",color:parseFloat(avgDay)>=0?"#4caf50":"#ef5350"},
          {label:t("topWeekly",lang),value:topGainer.name.replace(/"/g,""),sub:"▲ "+topGainer.week.toFixed(2)+"%",color:"#ffd700"}
        ].map(function(s){return(
          <div key={s.label} style={{ background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"14px 16px" }}>
            <div style={{ fontSize:11,color:"#555",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:6 }}>{s.label}</div>
            <div style={{ fontSize:17,fontWeight:700,color:s.color||"#fff",marginBottom:2 }}>{s.value}</div>
            <div style={{ fontSize:11,color:"#555" }}>{s.sub}</div>
          </div>
        )})}
      </div>

      <div className="s2-main" style={{ padding:"0 28px",display:"grid",gridTemplateColumns:"1fr 320px",gap:16 }}>
        <div>
          <div className="s2-filters" style={{ display:"flex",gap:8,marginBottom:14,flexWrap:"wrap" }}>
            <input type="text" placeholder={t("searchItems",lang)} value={search} onChange={function(e){setSearch(e.target.value)}} style={{ flex:1,minWidth:120,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 14px",color:"#eee",fontSize:13,outline:"none" }} />
            <select value={typeFilter} onChange={function(e){setTypeFilter(e.target.value)}} style={{ background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 10px",color:"#ccc",fontSize:13,cursor:"pointer" }}>
              {dynamicTypes.map(function(t){return <option key={t} value={t}>{t}</option>})}
            </select>
            <select value={collFilter} onChange={function(e){setCollFilter(e.target.value)}} style={{ background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 10px",color:"#ccc",fontSize:13,cursor:"pointer" }}>
              {["All","2 Years","4 Years","5 Years","8 Years","9 Years","Assistance","Breakout","Chameleon","Champions","Collaboration","Competitive","Cursed Souls","Dia de Muertos","Division","Dragon Rise","Dynasty","Empire","Esports","FUN&SUN","Fable","Fireborn","Flow","Frosty Chaos","Furious","Gambit","Halloween 2019","Halloween 2020","Hot Winter Party","Joy","Kitsune Dreams","Legends","Nameless","New Year 2020","New Year 2021","Nightmare","Origin","Outcast","Prey","Project Pandora","Project Z9","Rainbow","Reforged","Revenge","Revival","Rewind","Rival","Scorpion","Sharp","Shine","Space Vision","Splash","Standoff 2","Stream","Subject X","Sunstrike","Syndicate","Traveler's Bag","Valor","Vibe","Winter Fun 2022","Winter Tale","Year of the Horse","Other"].map(function(c){return <option key={c} value={c}>{c}</option>})}
            </select>
            <select value={sort} onChange={function(e){setSort(e.target.value)}} style={{ background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 10px",color:"#ccc",fontSize:13,cursor:"pointer" }}>
              <option value="price">{t("sortPrice",lang)}</option>
              <option value="day">{t("sort24h",lang)}</option>
              <option value="week">{t("sort7d",lang)}</option>
              <option value="year">{t("sort1y",lang)}</option>
            </select>
          </div>
          <div style={{ fontSize:11,color:"#444",marginBottom:10 }}>{filtered.length.toLocaleString()} item{filtered.length!==1?"s":""}</div>
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {filtered.map(function(item,idx){return <ItemCard key={item.name+"_"+idx} item={item} onClick={setSelected} selected={selected&&selected.name===item.name} onGraph={setGraphItem} />})}
            {filtered.length===0 && <div style={{ color:"#555",fontSize:14,textAlign:"center",padding:"40px 0" }}>No items found</div>}
          </div>
        </div>
        <div className="s2-detail" style={{ background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:20,position:"sticky",top:20,alignSelf:"flex-start" }}>
          <DetailPanel item={selected} onGraph={setGraphItem} />
          {siteConfig.chatEnabled && <ItemChat item={selected} tier={tier} />}
        </div>
      </div>
      </div>)}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<script>
  // Fetch ITEMS and ITEM_COLLECTIONS from external JSON files before running the app.
  // This keeps index.html small and makes price/collection updates simple file swaps.
  (function() {
    Promise.all([
      fetch('/items.json').then(function(r){ return r.json(); }),
      fetch('/collections.json').then(function(r){ return r.json(); })
    ]).then(function(data) {
      window.ITEMS = data[0];
      window.ITEM_COLLECTIONS = data[1];
      var src = document.getElementById('app-source').textContent;
      var result = Babel.transform(src, { plugins: [['transform-react-jsx', { runtime: 'classic' }]] });
      var script = document.createElement('script');
      script.textContent = result.code;
      document.body.appendChild(script);
    }).catch(function(err) {
      console.error('Failed to load item data:', err);
      document.getElementById('root').innerHTML =
        '<div style="color:#e44;text-align:center;padding:60px;font-family:sans-serif">' +
        '<h2>Failed to load market data</h2>' +
        '<p>Please refresh the page. If the problem persists, check that items.json and collections.json are deployed.</p>' +
        '</div>';
    });
  })();
</script>
</body>
</html>
